<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<style>
:root { --accent: #ff8c00; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: white;
    overflow: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* ── Starfield ── */
#stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
@keyframes drift { from { transform: translateY(0px); } to { transform: translateY(-120vh); } }

#bottom-glow {
    position: fixed;
    bottom: -35vh; left: 50%;
    transform: translateX(-50%);
    width: 140vw; height: 80vh;
    z-index: 0; pointer-events: none;
    transition: background 0.4s ease;
}

.container { position: relative; z-index: 1; text-align: center; width: 90%; }

.logo {
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: 900;
    letter-spacing: 12px;
    margin-bottom: 60px;
    color: white;
    position: relative;
    z-index: 1;
    animation: logoPulse 6s ease-in-out infinite;
    transition: text-shadow 0.4s ease;
}

.logo::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 140%; height: 180%;
    filter: blur(40px);
    z-index: -1;
    pointer-events: none;
    transition: background 0.4s ease;
}

@keyframes logoPulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.015); filter: brightness(1.08); }
}

/* ── Launcher Grid ── */
.launcher {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 22px;
    justify-content: center;
    align-items: center;
    max-width: 650px;
    margin: 0 auto;
    padding: 10px;
}

.card {
    width: 100%;
    aspect-ratio: 1 / 1;
    text-decoration: none;
    color: white;
    border-radius: 24px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-6px) scale(1.06);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.card:hover::before { opacity: 1; }

.icon {
    font-size: 2.6rem;
    margin-bottom: 10px;
    transition: text-shadow 0.3s ease;
}

.label { font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; }

.version {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem; opacity: 0.45; z-index: 1;
}

/* ── Dot Cursor ── */
#phantom-dot {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    display: none;
}

/* ── Boot Screen ── */
#boot {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999999;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    display: none;
}

.boot-center { text-align: center; width: 90%; }

.boot-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 900;
    letter-spacing: 12px;
    color: white;
    margin-bottom: 18px;
    animation: bootPulse 2s ease-in-out infinite;
}

@keyframes bootPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(1.02); }
}

.boot-sub {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 24px;
    min-height: 1em;
}

.boot-bar {
    width: min(320px, 80vw);
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    margin: 0 auto 20px;
}

.boot-progress {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 0.25s ease;
}

.boot-small {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.35);
}

.boot-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
}

@media (max-width: 550px) {
    .launcher { grid-template-columns: repeat(2, 130px); }
    .logo { margin-bottom: 40px; letter-spacing: 6px; }
}
</style>
</head>
<body>

<!-- PHANTOM Boot Screen -->
<div id="boot">
    <div class="boot-center">
        <div class="boot-logo" id="bootLogo">PHANTOM</div>
        <div class="boot-sub" id="bootText">INITIALIZING SYSTEM</div>
        <div class="boot-bar">
            <div class="boot-progress" id="bootBar"></div>
        </div>
    </div>
</div>

<div id="phantom-dot"></div>
<div id="bottom-glow"></div>
<div id="stars"></div>

<div class="container">
    <h1 class="logo" id="logo">PHANTOM</h1>
    <div class="launcher">
        <a href="g.html" class="card">
            <div class="icon"><i class="fa-solid fa-gamepad"></i></div>
            <div class="label">GAMES</div>
        </a>
        <a href="a.html" class="card">
            <div class="icon"><i class="fa-solid fa-cubes"></i></div>
            <div class="label">APPS</div>
        </a>
        <a href="e.html" class="card">
            <div class="icon"><i class="fa-solid fa-user-secret"></i></div>
            <div class="label">EXPLOITS</div>
        </a>
        <a href="movies.html" class="card">
            <div class="icon"><i class="fa-solid fa-clapperboard"></i></div>
            <div class="label">MOVIES</div>
        </a>
        <a href="music.html" class="card">
            <div class="icon"><i class="fa-solid fa-music"></i></div>
            <div class="label">MUSIC</div>
        </a>
        <a href="unblocker.html" class="card">
            <div class="icon"><i class="fa-solid fa-globe"></i></div>
            <div class="label">UNBLOCKER</div>
        </a>
        <a href="account.html" class="card">
            <div class="icon"><i class="fa-solid fa-user"></i></div>
            <div class="label">ACCOUNT</div>
        </a>
        <a href="s.html" class="card">
            <div class="icon"><i class="fa-solid fa-gear"></i></div>
            <div class="label">SETTINGS</div>
        </a>
    </div>
</div>
<div class="version" id="version">PHANTOM</div>

<script>
/* ── Starfield Animation ── */
const sc = document.getElementById("stars");
for (let i = 0; i < 90; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2 + 1;
    s.style.width = `${size}px`;
    s.style.height = `${size}px`;
    s.style.left = `${Math.random() * 100}%`;
    s.style.top = `${Math.random() * 120}%`;
    s.style.opacity = Math.random() * 0.6 + 0.2;
    s.style.animationDuration = `${Math.random() * 80 + 80}s`;
    s.style.animationDelay = `-${Math.random() * 100}s`;
    sc.appendChild(s);
}

/* ── Utility ── */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
}
function rgba(hex, a) {
    const {r,g,b} = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
}

/* ── Apply Accent Color ── */
function applyAccent(color) {
    document.documentElement.style.setProperty('--accent', color);

    /* Logo Glow */
    document.getElementById('logo').style.textShadow = `
        0 0 6px rgba(255,255,255,0.15),
        0 0 15px ${rgba(color,0.40)},
        0 0 30px ${rgba(color,0.25)},
        0 0 60px ${rgba(color,0.15)}`;

    /* Dynamic Style Tag for Halo and Cards */
    let dynStyle = document.getElementById('dynamic-style');
    if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'dynamic-style'; document.head.appendChild(dynStyle); }
    dynStyle.textContent = `
        .logo::after { background: radial-gradient(ellipse, ${rgba(color,0.18)} 0%, ${rgba(color,0.08)} 35%, transparent 70%); }
        .card { border: 1px solid ${rgba(color,0.15)}; }
        .card:hover { 
            border-color: ${rgba(color,0.40)}; 
            box-shadow: 0 0 18px ${rgba(color,0.18)}, inset 0 0 20px ${rgba(color,0.04)}; 
        }
        .icon { text-shadow: 0 0 8px ${rgba(color,0.25)}, 0 0 18px ${rgba(color,0.15)}; }
        .card:hover .icon { text-shadow: 0 0 12px ${rgba(color,0.40)}, 0 0 28px ${rgba(color,0.25)}; }
    `;

    /* Bottom glow */
    document.getElementById('bottom-glow').style.background =
        `radial-gradient(ellipse at center, ${rgba(color,0.12)} 0%, ${rgba(color,0.04)} 35%, transparent 70%)`;

    updateDotStyle(color);
}

/* ── Cursor Logic ── */
const dot = document.getElementById('phantom-dot');
let dotActive = false;

function updateDotStyle(color) {
    if (!color) color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    dot.style.background = color;
    dot.style.boxShadow = `0 0 6px 2px ${color}, 0 0 14px 4px ${rgba(color,0.50)}, 0 0 28px 8px ${rgba(color,0.25)}`;
}

document.addEventListener('mousemove', e => {
    if (!dotActive) return;
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
});

function enableDotCursor() {
    dotActive = true; dot.style.display = 'block'; updateDotStyle();
    let s = document.getElementById('dot-cursor-style');
    if (!s) { s = document.createElement('style'); s.id = 'dot-cursor-style'; s.textContent = '*{cursor:none!important;}'; document.head.appendChild(s); }
}

function disableDotCursor() {
    dotActive = false; dot.style.display = 'none';
    const s = document.getElementById('dot-cursor-style'); if (s) s.remove();
}

function applyCursor(cur) {

    document.documentElement.style.cursor = "";

    if (cur === "dot") {
        enableDotCursor();
    } else {
        disableDotCursor();

        if (cur !== "default") {
            document.documentElement.style.cursor = cur;
        }
    }
}

function applyWallpaper(url) {
    if (!url) {
        document.body.style.backgroundImage = "";
        return;
    }

    document.body.style.backgroundImage = `url('${url}')`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
}

function applyTabCloak(name, icon) {

    if (!name) {
        document.title = "PHANTOM";

        let link = document.querySelector("link[rel='icon']");
        if (link) link.href = "";

        return;
    }

    document.title = name;

    let link = document.querySelector("link[rel='icon']");
    if (!link) {
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
    }

    link.href = icon || "";
}
/* ── Panic Key ── */
let panicEnabled = false;
document.addEventListener('keydown', e => {
    if (!panicEnabled) return;
    const pk = localStorage.getItem('phantom_panickey');
    const url = localStorage.getItem('phantom_panicurl') || 'https://google.com';
    if (pk && e.key.toLowerCase() === pk.toLowerCase()) window.location.href = url;
});

function loadSettings() {
    const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
    const cursor = localStorage.getItem('phantom_cursor') || 'default';
    const wallpaper = localStorage.getItem('phantom_wallpaper') || '';
    const cloakOn = localStorage.getItem('phantom_cloak_on') === 'true';
    const cloakName = localStorage.getItem('phantom_cloak_name') || '';
    const cloakIcon = localStorage.getItem('phantom_cloak_icon') || '';
    const panicOn = localStorage.getItem('phantom_panic_on') === 'true';

    applyAccent(accent);
    applyCursor(cursor);

    if (wallpaper) {
        applyWallpaper(wallpaper);
    } else {
        document.body.style.backgroundImage = "";
    }

    if (cloakOn && cloakName) {
        applyTabCloak(cloakName, cloakIcon);
    } else {
        document.title = "PHANTOM";

        let link = document.querySelector("link[rel='icon']");
        if (link) link.href = "";
    }

    panicEnabled = panicOn;
}

loadSettings();

// Reload if another tab changes settings
window.addEventListener("storage", loadSettings);

// Reload every time this page is shown again
window.addEventListener("pageshow", loadSettings);
/* ── Boot Animation ── */
window.addEventListener('load', () => {
    const boot = document.getElementById('boot');

    if (sessionStorage.getItem('phantomBootPlayed') === 'true') {
        boot.remove();
        return;
    }

    sessionStorage.setItem('phantomBootPlayed', 'true');
    boot.style.display = 'flex';

    const progress = document.getElementById('bootBar');
    const text = document.getElementById('bootText');
    const bootLogo = document.getElementById('bootLogo');
    const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
    const rgb = hexToRgb(accent);

    bootLogo.style.textShadow = `0 0 15px ${rgba(accent, 0.45)}, 0 0 30px ${rgba(accent, 0.30)}`;
    progress.style.boxShadow = `0 0 10px ${accent}, 0 0 20px ${accent}`;
    progress.style.background = accent;

    const messages = ['INITIALIZING SYSTEM', 'LOADING CORE MODULES', 'VERIFYING SECURITY', 'RESTORING USER SETTINGS', 'STARTING INTERFACE', 'READY'];
    let percent = 0;
    let step = 0;

    const interval = setInterval(() => {
        percent += Math.floor(Math.random() * 15) + 5;
        if (percent > 100) percent = 100;
        progress.style.width = percent + '%';

        if (step < messages.length && percent > (step * 20)) {
            text.textContent = messages[step];
            step++;
        }

        if (percent >= 100) {
            clearInterval(interval);
            text.textContent = 'WELCOME TO PHANTOM';
            setTimeout(() => {
                boot.classList.add('boot-hidden');
                setTimeout(() => boot.remove(), 700);
            }, 800);
        }
    }, 300);
});

/* ── Version Loader ── */
fetch("./version.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("version").textContent =
            `PHANTOM ${data.version}`;
    })
    .catch(() => {
        document.getElementById("version").textContent =
            "PHANTOM";
    });

</script>
</body>
</html>
