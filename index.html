<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <style>
        :root { --accent: #ff8c00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

        #bottom-glow {
            position: fixed;
            bottom: -35vh; left: 50%;
            transform: translateX(-50%);
            width: 140vw; height: 80vh;
            z-index: 0; pointer-events: none;
            transition: background 0.4s ease;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
        }

        .logo-section { text-align: left; }
        .logo {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            color: white;
            line-height: 1;
            margin-bottom: 4px;
            transition: text-shadow 0.4s ease;
        }
        .page-subtitle {
            font-size: 0.65rem;
            letter-spacing: 4px;
            opacity: 0.4;
        }

        .search-container {
            margin-bottom: 40px;
            position: relative;
            max-width: 500px;
        }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px 14px 45px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.06);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px var(--accent);
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s;
            opacity: 0.6;
        }
        .game-card:hover .game-image {
            opacity: 1;
            transform: scale(1.1);
        }

        .game-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            z-index: 2;
        }

        .game-name {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .game-category {
            font-size: 0.5rem;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        #phantom-dot {
            position: fixed; width: 10px; height: 10px;
            border-radius: 50%; pointer-events: none;
            z-index: 999999; transform: translate(-50%, -50%);
            display: none;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            opacity: 0.4;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div id="bottom-glow"></div>
<div id="stars"></div>

<div class="page">
    <div class="header-nav">
        <div class="logo-section">
            <h1 class="logo" id="logo">PHANTOM</h1>
            <div class="page-subtitle">SECURE ACCESS</div>
        </div>
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        <input type="text" class="search-input" id="gameSearch" placeholder="ACCESSING SOURCE..." oninput="filterGames()">
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="status-msg">
            <i class="fa-solid fa-circle-notch fa-spin"></i><br><br>
            INITIALIZING FETCH...
        </div>
    </div>
</div>

<div id="phantom-dot"></div>

<script>
    let gamesData = [];
    
    // Master Source Repository API
    const SOURCE_API = 'https://api.github.com/repos/bubbls/ugs-singlefile/contents/UGS-Files';

    /* Launch logic: Replaces the current tab with the game source */
    async function launchGame(downloadUrl, name) {
        try {
            const res = await fetch(downloadUrl);
            if (!res.ok) return;
            const html = await res.text();
            
            // Wipe current document and write game code
            document.open();
            document.write(html);
            document.close();
            
            // Set the tab name to the game title
            document.title = name;
        } catch (err) {
            // Fails silently to comply with no-cl/no-alert rules
        }
    }

    /* Name Formatting: Strips "CL" prefix and formats CamelCase */
    function formatName(filename) {
        let name = filename.replace(/\.html$/, "");
        
        // Strip "CL" or "CL_" prefix found in repository naming
        name = name.replace(/^CL_?/i, "");
        
        // CamelCase to Space Case
        name = name.replace(/([A-Z])/g, ' $1').trim();
        
        return name.toUpperCase();
    }

    /* Rendering: Builds the game cards */
    function renderGames(games) {
        const grid = document.getElementById('gamesGrid');
        if (!games || games.length === 0) {
            grid.innerHTML = '<div class="status-msg">NO GAMES DETECTED</div>';
            return;
        }

        grid.innerHTML = games.map(file => {
            const displayName = formatName(file.name);
            const img = `https://placehold.co/400x400/111111/ffffff?text=${encodeURIComponent(displayName)}`;
            return `
                <div class="game-card" onclick="launchGame('${file.download_url}', '${displayName}')">
                    <img src="${img}" alt="${displayName}" class="game-image">
                    <div class="game-overlay">
                        <div class="game-name">${displayName}</div>
                        <div class="game-category">GAME</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    /* Search Filter */
    function filterGames() {
        const query = document.getElementById('gameSearch').value.toLowerCase();
        const filtered = gamesData.filter(file => 
            file.name.toLowerCase().includes(query)
        );
        renderGames(filtered);
    }

    /* Dynamic Fetch: Imports games from URL */
    async function loadGames() {
        const grid = document.getElementById('gamesGrid');
        try {
            const res = await fetch(SOURCE_API);
            if (!res.ok) throw new Error();
            
            const data = await res.json();
            
            // Only import .html files
            gamesData = data.filter(item => item.name.endsWith('.html'));
            
            document.getElementById('gameSearch').placeholder = `SEARCH ${gamesData.length} GAMES...`;
            renderGames(gamesData);
        } catch (err) {
            grid.innerHTML = `
                <div class="status-msg" style="color: #ff4444; opacity: 1;">
                    CONNECTION FAILED<br>
                    <span style="font-size: 0.5rem;">USE GITHUB PAGES OR CHECK NETWORK</span>
                </div>`;
        }
    }

    /* Visuals */
    function initVisuals() {
        const sc = document.getElementById("stars");
        for (let i = 0; i < 90; i++) {
            const s = document.createElement("div");
            s.className = "star";
            const size = Math.random() * 2 + 1;
            s.style.width = s.style.height = `${size}px`;
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 120}%`;
            s.style.animationDuration = `${Math.random() * 80 + 80}s`;
            sc.appendChild(s);
        }

        const dot = document.getElementById('phantom-dot');
        document.addEventListener('mousemove', e => {
            if(localStorage.getItem('phantom_cursor') === 'dot') {
                const color = localStorage.getItem('phantom_accent') || '#ff8c00';
                dot.style.display = 'block';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
                dot.style.background = color;
                dot.style.boxShadow = `0 0 15px ${color}`;
            }
        });
    }

    (function init() {
        initVisuals();
        const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
        document.documentElement.style.setProperty('--accent', accent);
        
        const logo = document.getElementById('logo');
        if (logo) logo.style.textShadow = `0 0 15px ${accent}88`;
        
        loadGames();
    })();
</script>
</body>
</html>
