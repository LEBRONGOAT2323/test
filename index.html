<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <style>
        :root { --accent: #ff8c00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

        #bottom-glow {
            position: fixed;
            bottom: -35vh; left: 50%;
            transform: translateX(-50%);
            width: 140vw; height: 80vh;
            z-index: 0; pointer-events: none;
            transition: background 0.4s ease;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-decoration: none;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--accent); }

        .logo-section { text-align: right; }
        .logo {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            color: white;
            line-height: 1;
            margin-bottom: 4px;
            transition: text-shadow 0.4s ease;
        }
        .page-subtitle {
            font-size: 0.65rem;
            letter-spacing: 4px;
            opacity: 0.4;
        }

        .search-container {
            margin-bottom: 40px;
            position: relative;
            max-width: 500px;
        }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px 14px 45px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s;
        }
        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.06);
        }

        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s;
        }

        .game-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            z-index: 2;
        }

        .game-name {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .game-category {
            font-size: 0.5rem;
            opacity: 0.5;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        #phantom-dot {
            position: fixed; width: 10px; height: 10px;
            border-radius: 50%; pointer-events: none;
            z-index: 999999; transform: translate(-50%, -50%);
            display: none;
        }

        .error-message {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px;
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="bottom-glow"></div>
<div id="stars"></div>

<div class="page">
    <div class="header-nav">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i> BACK
        </button>
        <div class="logo-section">
            <h1 class="logo" id="logo">PHANTOM</h1>
            <div class="page-subtitle">GAMES</div>
        </div>
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        <input type="text" class="search-input" id="gameSearch" placeholder="SEARCH REPOSITORY..." oninput="filterGames()">
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="error-message">CONNECTING TO REPOSITORY...</div>
    </div>
</div>

<div id="phantom-dot"></div>

<script>
    let gamesData = [];
    
    // UPDATED: Reliable repository URLs
    // We use a high-availability CDN (jsDelivr) for the game files
    const FILE_BASE = 'https://cdn.jsdelivr.net';
    const LIST_URL = 'https://cdn.jsdelivr.net';

    /* Launch logic */
    function launchGame(url, name) {
        // Simple redirect for remote games
        if(url.startsWith('http')) {
            window.open(url, '_blank');
            return;
        }

        // Fetching the individual file content
        const fullUrl = FILE_BASE + url;
        fetch(fullUrl)
            .then(res => {
                if(!res.ok) throw new Error("File not found");
                return res.text();
            })
            .then(html => {
                const win = window.open('about:blank', '_blank');
                win.document.open();
                win.document.write(html);
                win.document.close();
            })
            .catch(err => {
                alert("Error launching " + name + ": " + err.message);
            });
    }

    /* Rendering */
    function renderGames(games) {
        const grid = document.getElementById('gamesGrid');
        if (!games || games.length === 0) {
            grid.innerHTML = '<div class="error-message">NO GAMES FOUND IN REPOSITORY</div>';
            return;
        }

        grid.innerHTML = games.map(game => {
            const name = game.name || "Untitled";
            // Normal image handling with high-quality fallback
            const img = game.img || `https://placehold.co/400x400/1a1a1a/ffffff?text=${encodeURIComponent(name)}`;
            
            return `
                <div class="game-card" onclick="launchGame('${game.url}', '${name}')">
                    <img src="${img}" alt="${name}" class="game-image" loading="lazy">
                    <div class="game-overlay">
                        <div class="game-name">${name}</div>
                        <div class="game-category">${game.category || 'ACTION'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    /* Fetching logic with Error Details */
    async function loadGames() {
        try {
            console.log("Attempting to fetch:", LIST_URL);
            const res = await fetch(LIST_URL);
            
            if (!res.ok) {
                throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            }
            
            gamesData = await res.json();
            renderGames(gamesData);
            
        } catch (err) {
            console.error("Fetch Error Detail:", err);
            document.getElementById('gamesGrid').innerHTML = `
                <div class="error-message">
                    <i class="fa-solid fa-triangle-exclamation"></i><br><br>
                    REPOSITORY FETCH FAILED<br>
                    <span style="font-size: 0.6rem; opacity: 0.5;">${err.message}</span><br><br>
                    <button onclick="loadGames()" style="background: var(--accent); border: none; color: black; padding: 5px 15px; font-family: inherit; cursor: pointer; border-radius: 5px;">RETRY</button>
                </div>
            `;
        }
    }

    function filterGames() {
        const query = document.getElementById('gameSearch').value.toLowerCase();
        const filtered = gamesData.filter(game => 
            game.name.toLowerCase().includes(query) || (game.category && game.category.toLowerCase().includes(query))
        );
        renderGames(filtered);
    }

    /* Visual Init (Starfield/Cursor) */
    function initVisuals() {
        const sc = document.getElementById("stars");
        for (let i = 0; i < 90; i++) {
            const s = document.createElement("div");
            s.className = "star";
            s.style.width = s.style.height = `${Math.random() * 2 + 1}px`;
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 120}%`;
            s.style.animationDuration = `${Math.random() * 80 + 80}s`;
            sc.appendChild(s);
        }

        const dot = document.getElementById('phantom-dot');
        document.addEventListener('mousemove', e => {
            if (localStorage.getItem('phantom_cursor') === 'dot') {
                dot.style.display = 'block';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
                dot.style.background = localStorage.getItem('phantom_accent') || '#ff8c00';
            }
        });
    }

    (function init() {
        initVisuals();
        const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
        document.documentElement.style.setProperty('--accent', accent);
        document.getElementById('logo').style.textShadow = `0 0 15px ${accent}66`;
        loadGames();
    })();
</script>
</body>
</html>
