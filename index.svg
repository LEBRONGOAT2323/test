<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">

  <foreignObject x="0" y="0" width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">

<![CDATA[

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <style>
        :root { --accent: #ff8c00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

        #bottom-glow {
            position: fixed;
            bottom: -35vh; left: 50%;
            transform: translateX(-50%);
            width: 140vw; height: 80vh;
            z-index: 0; pointer-events: none;
            transition: background 0.4s ease;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
        }

        .logo {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 8px;
            color: white;
            line-height: 1;
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 0.65rem;
            letter-spacing: 4px;
            opacity: 0.4;
        }

        .search-container {
            margin-bottom: 40px;
            position: relative;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px 14px 45px;
            color: white;
            font-family: 'Orbitron', sans-serif;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
        }

        .game-card:hover {
            border: 1px solid var(--accent);
        }

        .game-name {
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            opacity: 0.4;
        }

        #phantom-dot {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999999;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
</head>

<body>

<div id="bottom-glow"></div>
<div id="stars"></div>

<div class="page">
    <div class="header-nav">
        <div>
            <div class="logo" id="logo">PHANTOM</div>
            <div class="page-subtitle">SECURE ACCESS</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" id="gameSearch" placeholder="CONNECTING..." oninput="filterGames()">
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="status-msg">
            <i class="fa-solid fa-circle-notch fa-spin"></i><br><br>
            FETCHING REPOSITORY...
        </div>
    </div>
</div>

<div id="phantom-dot"></div>

<script>
let gamesData = [];
const SOURCE_API = 'https://api.github.com/repos/bubbls/ugs-singlefile/contents/UGS-Files';

function formatName(filename) {
    let name = filename.replace(/\.html$/, "");
    name = name.replace(/^CL_?/i, "");
    name = name.replace(/([A-Z])/g, ' $1').trim();
    return name.toUpperCase();
}

function launchGame(downloadUrl, name) {
    document.title = name;

    document.body.innerHTML = '';
    document.body.style.margin = '0';
    document.body.style.padding = '0';
    document.body.style.overflow = 'hidden';
    document.body.style.backgroundColor = '#000';

    document.head.innerHTML =
        '<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>' + name + '</title>';

    const iframe = document.createElement('iframe');
    iframe.src = downloadUrl;
    iframe.style.position = 'fixed';
    iframe.style.top = '0';
    iframe.style.left = '0';
    iframe.style.width = '100vw';
    iframe.style.height = '100vh';
    iframe.style.border = 'none';

    document.body.appendChild(iframe);
}

function renderGames(games) {
    const grid = document.getElementById('gamesGrid');

    if (!games || games.length === 0) {
        grid.innerHTML = '<div class="status-msg">NO GAMES FOUND</div>';
        return;
    }

    grid.innerHTML = games.map(file => {
        const displayName = formatName(file.name);
        const img = 'https://placehold.co/400x400/111111/ffffff?text=' + encodeURIComponent(displayName);

        return `
        <div class="game-card" onclick="launchGame('${file.download_url}','${displayName}')">
            <div class="game-name">${displayName}</div>
        </div>`;
    }).join('');
}

function filterGames() {
    const query = document.getElementById('gameSearch').value.toLowerCase();
    renderGames(gamesData.filter(f => f.name.toLowerCase().includes(query)));
}

async function loadGames() {
    try {
        const res = await fetch(SOURCE_API);
        const data = await res.json();

        gamesData = data.filter(item => item.name.endsWith('.html'));

        document.getElementById('gameSearch').placeholder =
            'SEARCH ' + gamesData.length + ' GAMES...';

        renderGames(gamesData);

    } catch (e) {
        document.getElementById('gamesGrid').innerHTML =
            '<div class="status-msg">FETCH FAILED</div>';
    }
}

function initVisuals() {
    const sc = document.getElementById("stars");

    for (let i = 0; i < 90; i++) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.width = s.style.height = (Math.random() * 2 + 1) + "px";
        s.style.left = (Math.random() * 100) + "%";
        s.style.top = (Math.random() * 120) + "%";
        s.style.animationDuration = (Math.random() * 80 + 80) + "s";
        sc.appendChild(s);
    }

    const dot = document.getElementById('phantom-dot');

    document.addEventListener('mousemove', e => {
        if (localStorage.getItem('phantom_cursor') === 'dot') {
            const color = localStorage.getItem('phantom_accent') || '#ff8c00';
            dot.style.display = 'block';
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            dot.style.background = color;
            dot.style.boxShadow = '0 0 15px ' + color;
        }
    });
}

(function init() {
    initVisuals();

    const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
    document.documentElement.style.setProperty('--accent', accent);

    const logo = document.getElementById('logo');
    if (logo) logo.style.textShadow = '0 0 15px ' + accent + '88';

    loadGames();
})();
</script>

</body>
</html>

]]>
    </div>
  </foreignObject>
</svg>
