<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<style>
:root { --accent: #ff8c00; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: white;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

#stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
@keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

#bottom-glow {
    position: fixed;
    bottom: -35vh; left: 50%;
    transform: translateX(-50%);
    width: 140vw; height: 80vh;
    z-index: 0; pointer-events: none;
    transition: background 0.4s ease;
}

.page {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
}

.header-nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-decoration: none;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    transition: color 0.2s;
}
.back-btn:hover { color: var(--accent); }

.logo-section { text-align: right; }
.logo {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: 8px;
    color: white;
    line-height: 1;
    margin-bottom: 4px;
    transition: text-shadow 0.4s ease;
}
.page-subtitle {
    font-size: 0.65rem;
    letter-spacing: 4px;
    opacity: 0.4;
}

.search-container {
    margin-bottom: 40px;
    position: relative;
    max-width: 500px;
}
.search-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 20px 14px 45px;
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    outline: none;
    transition: all 0.3s;
}
.search-container i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    opacity: 0.3;
    transition: opacity 0.3s;
}

.games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
}

.game-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    text-decoration: none;
    color: white;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1 / 1;
}

.game-card:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.06);
}

.game-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: all 0.3s;
}

.game-card:hover .game-image {
    transform: scale(1.05);
}

.game-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
    z-index: 2;
}

.game-name {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
}

.game-category {
    font-size: 0.5rem;
    opacity: 0.5;
    letter-spacing: 2px;
    margin-top: 2px;
}

/* Game Viewer */
#game-viewer {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: #000;
    display: none;
}
#game-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
}
.viewer-controls {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 10001;
}
.viewer-btn {
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid var(--accent);
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    transition: 0.3s;
    text-transform: uppercase;
}
.viewer-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 15px var(--accent);
}

#phantom-dot {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%);
    display: none;
}

.version {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem; opacity: 0.3; z-index: 1;
    letter-spacing: 2px;
}

.loading-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 50px;
    opacity: 0.5;
    letter-spacing: 3px;
    font-size: 0.8rem;
}

@media (max-width: 600px) {
    .header-nav { flex-direction: column; gap: 20px; }
    .logo-section { text-align: left; }
}
</style>
</head>
<body>

<div id="bottom-glow"></div>
<div id="stars"></div>

<!-- Game Viewer Container -->
<div id="game-viewer">
    <div class="viewer-controls">
        <button class="viewer-btn" onclick="closeGame()">
            <i class="fa-solid fa-xmark"></i> EXIT
        </button>
        <button class="viewer-btn" id="external-link-btn" onclick="openExternal()">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> DOWNLOAD GAME
        </button>
    </div>
    <iframe id="game-frame" allow="fullscreen; autoplay; gamepad; focus-without-user-activation" src="about:blank"></iframe>
</div>

<div class="page">
    <div class="header-nav">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i> BACK
        </button>
        <div class="logo-section">
            <h1 class="logo" id="logo">PHANTOM</h1>
            <div class="page-subtitle">GAMES</div>
        </div>
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        <input type="text" class="search-input" id="gameSearch" placeholder="SEARCH GAMES..." oninput="filterGames()">
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="loading-msg">CONNECTING TO GAMES...</div>
    </div>
</div>

<div class="version" id="version">PHANTOM</div>
<div id="phantom-dot"></div>

<script>
let gamesData = [];
let currentUrl = "";

/* Starfield */
const sc = document.getElementById("stars");
for (let i = 0; i < 90; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2 + 1;
    s.style.width = `${size}px`;
    s.style.height = `${size}px`;
    s.style.left = `${Math.random() * 100}%`;
    s.style.top = `${Math.random() * 120}%`;
    s.style.opacity = Math.random() * 0.6 + 0.2;
    s.style.animationDuration = `${Math.random() * 80 + 80}s`;
    s.style.animationDelay = `-${Math.random() * 100}s`;
    sc.appendChild(s);
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
}
function rgba(hex, a) {
    const {r,g,b} = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
}

function applyAccent(color) {
    document.documentElement.style.setProperty('--accent', color);
    const logo = document.getElementById('logo');
    if (logo) logo.style.textShadow = `0 0 15px ${rgba(color,0.40)}, 0 0 30px ${rgba(color,0.25)}`;
    
    const glow = document.getElementById('bottom-glow');
    if (glow) glow.style.background = `radial-gradient(ellipse at center, ${rgba(color,0.12)} 0%, transparent 70%)`;

    let dynStyle = document.getElementById('games-dynamic-style');
    if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'games-dynamic-style'; document.head.appendChild(dynStyle); }
    const hoverEnabled =
localStorage.getItem("phantom_game_hover")==="true";

dynStyle.textContent = `
.game-card{
    border:1px solid ${rgba(color,0.15)};
}

.game-card:hover{
    border-color:${rgba(color,0.50)};
    box-shadow:0 0 25px ${rgba(color,0.20)};
}

.search-input:focus{
    border-color:${rgba(color,0.40)};
    box-shadow:0 0 15px ${rgba(color,0.10)};
}

${
hoverEnabled
?`
.game-card:hover .game-name{
    color:${color};
    text-shadow:0 0 8px ${rgba(color,.45)};
}
`
:""
}
`;
}
 
/* Initialization */
async function loadGames() {
    try {
        const res = await fetch("https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json");
        const data = await res.json();

        gamesData = data.map(g => {

    const HTML_BASE = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
    const COVER_BASE = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";

    let finalUrl = g.url || "";

    // Handle template URLs like "{HTML_URL}/0.html"
    finalUrl = finalUrl.replace(/\{HTML_URL\}/g, HTML_BASE);

    // Handle plain numeric ids like "0"
    if (!finalUrl.startsWith("http")) {
        finalUrl = `${HTML_BASE}/${finalUrl.replace(/^\/+/, "")}`;
        if (!finalUrl.endsWith(".html")) {
            finalUrl += ".html";
        }
    }

    return {
        id: g.id,
        name: g.name,
        category: g.category || "GAMES",
        image: (g.cover || "").replace(/\{COVER_URL\}/g, COVER_BASE),
        url: finalUrl
    };
});

        renderGames(gamesData);
    } catch (err) {
        console.error("Dashboard error:", err);
        document.getElementById('gamesGrid').innerHTML = '<div class="loading-msg">FAIL: CHECK CONNECTION</div>';
    }
}

function renderGames(games) {
    const grid = document.getElementById('gamesGrid');
    if (!grid) return;
    
    if (games.length === 0) {
        grid.innerHTML = '<div class="loading-msg">NO GAMES FOUND</div>';
        return;
    }

    grid.innerHTML = games.map(game => `
        <div class="game-card" onclick="openGame('${game.url}')">
            <img src="${game.image}" alt="${game.name}" class="game-image" onerror="this.src='https://via.placeholder.com'">
            <div class="game-overlay">
                <div class="game-name"
                style="${
                localStorage.getItem('phantom_game_hover')==='true'
                ?`transition:.3s;`
                :''
                }">
                ${game.name}
                </div>
                <div class="game-category">${game.category}</div>
            </div>
        </div>
    `).join('');
}

function filterGames() {
    const query = document.getElementById('gameSearch').value.toLowerCase();
    const filtered = gamesData.filter(g => 
        g.name.toLowerCase().includes(query) || g.category.toLowerCase().includes(query)
    );
    renderGames(filtered);
}

async function openGame(url) {
    currentUrl = url;

    const viewer = document.getElementById('game-viewer');
    const frame = document.getElementById('game-frame');

    viewer.style.display = 'block';
    document.body.style.overflow = 'hidden';

   
    frame.src = "about:blank";

    try {
        
        const res = await fetch(url);
        const html = await res.text();

        const blob = new Blob([html], { type: "text/html" });
        const blobUrl = URL.createObjectURL(blob);

        frame.src = blobUrl;

        frame.onload = () => {
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        };

    } catch (err) {
        console.error("Game load failed:", err);
        frame.src = url; // fallback
    }

    try {
        history.pushState({ viewingGame: true }, "");
    } catch (e) {}
}


function openExternal() {
    if (currentUrl) window.open(currentUrl, '_blank');
}

function closeGame() {
    const viewer = document.getElementById('game-viewer');
    const frame = document.getElementById('game-frame');
    viewer.style.display = 'none';
    frame.src = "about:blank";
    document.body.style.overflow = '';
}

window.onpopstate = function() {
    if (document.getElementById('game-viewer').style.display === 'block') closeGame();
};

(function initSettings() {

    /* Accent */
    const accent = localStorage.getItem("phantom_accent") || "#ff8c00";
    applyAccent(accent);

    /* Wallpaper */
    const wallpaper = localStorage.getItem("phantom_wallpaper");
    if (wallpaper) {
        document.body.style.backgroundImage = `url('${wallpaper}')`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
    }

    /* Cursor */
    const cursor = localStorage.getItem("phantom_cursor") || "default";

    if (cursor === "dot") {
        const dot = document.getElementById("phantom-dot");

        dot.style.display = "block";
        document.documentElement.style.cursor = "none";

        const style = document.createElement("style");
        style.textContent = "*{cursor:none!important}";
        document.head.appendChild(style);

        dot.style.background = accent;
        dot.style.boxShadow =
            `0 0 6px ${accent},
             0 0 14px ${accent},
             0 0 28px ${accent}`;

        document.addEventListener("mousemove", e=>{
            dot.style.left=e.clientX+"px";
            dot.style.top=e.clientY+"px";
        });

    } else {
        document.documentElement.style.cursor =
            cursor === "default" ? "" : cursor;
    }

    /* Tab Cloak */
    if (localStorage.getItem("phantom_cloak_on")==="true"){

        const title =
            localStorage.getItem("phantom_cloak_name");

        const icon =
            localStorage.getItem("phantom_cloak_icon");

        if(title) document.title = title;

        if(icon){
            let link=document.querySelector("link[rel='icon']");
            if(!link){
                link=document.createElement("link");
                link.rel="icon";
                document.head.appendChild(link);
            }
            link.href=icon;
        }
    }

    /* Panic Key */
    if(localStorage.getItem("phantom_panic_on")==="true"){

        document.addEventListener("keydown",e=>{

            const key=
                localStorage.getItem("phantom_panickey");

            const url=
                localStorage.getItem("phantom_panicurl") ||
                "https://google.com";

            if(key && e.key===key){
                location.href=url;
            }

        });

    }

    loadGames();

})();


fetch("version.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("version").textContent =
            `PHANTOM ${data.version}`;
    })
    .catch(() => {
        document.getElementById("version").textContent =
            "PHANTOM";
    });

</script>
</body>
</html>
