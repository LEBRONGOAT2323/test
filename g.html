<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
<style>
:root { --accent: #ff8c00; }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Orbitron', sans-serif;
    background: #000;
    color: white;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

#stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: drift linear infinite; }
@keyframes drift { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

#bottom-glow {
    position: fixed;
    bottom: -35vh; left: 50%;
    transform: translateX(-50%);
    width: 140vw; height: 80vh;
    z-index: 0; pointer-events: none;
    transition: background 0.4s ease;
}

.page {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
}

.header-nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-decoration: none;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    transition: color 0.2s;
}
.back-btn:hover { color: var(--accent); }

.logo-section { text-align: right; }
.logo {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: 8px;
    color: white;
    line-height: 1;
    margin-bottom: 4px;
    transition: text-shadow 0.4s ease;
}
.page-subtitle {
    font-size: 0.65rem;
    letter-spacing: 4px;
    opacity: 0.4;
}

.search-container {
    margin-bottom: 40px;
    position: relative;
    max-width: 500px;
}
.search-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 20px 14px 45px;
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    outline: none;
    transition: all 0.3s;
}
.search-container i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    opacity: 0.3;
    transition: opacity 0.3s;
}

.games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
}

.game-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    text-decoration: none;
    color: white;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1 / 1;
}

.game-card:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.06);
}

.game-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(255,255,255,0.1), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1;
}
.game-card:hover::before { opacity: 1; }

.game-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: all 0.3s;
}

.game-card:hover .game-image {
    transform: scale(1.05);
}

.game-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
    z-index: 2;
}

.game-name {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.game-category {
    font-size: 0.5rem;
    opacity: 0.5;
    letter-spacing: 2px;
    margin-top: 2px;
}

.no-results {
    text-align: center;
    padding: 60px 20px;
    opacity: 0.4;
    font-size: 0.8rem;
    letter-spacing: 2px;
}

/* Game Viewer Styles */
#game-viewer {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: #000;
    display: none;
}
#game-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
}
.close-game-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10001;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid var(--accent);
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}
.close-game-btn:hover {
    background: var(--accent);
    color: black;
    box-shadow: 0 0 20px var(--accent);
}

#phantom-dot {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%);
    display: none;
}

.version {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem; opacity: 0.3; z-index: 1;
    letter-spacing: 2px;
}

.loading {
    text-align: center;
    padding: 60px 20px;
    opacity: 0.4;
    font-size: 0.75rem;
    letter-spacing: 2px;
}

@media (max-width: 600px) {
    .header-nav { flex-direction: column; gap: 20px; }
    .logo-section { text-align: left; }
    .games-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>
<body>

<div id="bottom-glow"></div>
<div id="stars"></div>

<!-- Game Viewer Container -->
<div id="game-viewer">
    <button class="close-game-btn" onclick="closeGame()">
        <i class="fa-solid fa-xmark"></i> EXIT GAME
    </button>
    <iframe id="game-frame" src=""></iframe>
</div>

<div class="page">
    <div class="header-nav">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i> BACK
        </button>
        <div class="logo-section">
            <h1 class="logo" id="logo">PHANTOM</h1>
            <div class="page-subtitle">GAMES</div>
        </div>
    </div>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
        <input type="text" class="search-input" id="gameSearch" placeholder="SEARCH GAMES..." oninput="filterGames()">
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="loading">LOADING GAMES...</div>
    </div>
</div>

<div class="version" id="version">PHANTOM</div>
<div id="phantom-dot"></div>

<script>
let gamesData = [];

/* Starfield Animation */
const sc = document.getElementById("stars");
for (let i = 0; i < 90; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2 + 1;
    s.style.width = `${size}px`;
    s.style.height = `${size}px`;
    s.style.left = `${Math.random() * 100}%`;
    s.style.top = `${Math.random() * 120}%`;
    s.style.opacity = Math.random() * 0.6 + 0.2;
    s.style.animationDuration = `${Math.random() * 80 + 80}s`;
    s.style.animationDelay = `-${Math.random() * 100}s`;
    sc.appendChild(s);
}

/* Utility Functions */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
}
function rgba(hex, a) {
    const {r,g,b} = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
}

/* Apply System Settings */
function applyAccent(color) {
    document.documentElement.style.setProperty('--accent', color);

    document.getElementById('logo').style.textShadow = `
        0 0 6px rgba(255,255,255,0.15),
        0 0 15px ${rgba(color,0.40)},
        0 0 30px ${rgba(color,0.25)}`;

    document.getElementById('searchIcon').style.color = color;
    document.getElementById('searchIcon').style.opacity = '0.6';

    document.getElementById('bottom-glow').style.background =
        `radial-gradient(ellipse at center, ${rgba(color,0.12)} 0%, ${rgba(color,0.04)} 35%, transparent 70%)`;

    const themedHover = localStorage.getItem('phantom_game_hover') === 'true';
    let dynStyle = document.getElementById('games-dynamic-style');
    if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'games-dynamic-style'; document.head.appendChild(dynStyle); }
    dynStyle.textContent = `
        .game-card { border: 1px solid ${rgba(color,0.15)}; }
        .game-card:hover {
            ${themedHover ? `border-color:${rgba(color,0.50)};box-shadow:0 0 25px ${rgba(color,0.20)}, inset 0 0 20px ${rgba(color,0.05)};` : `border-color:rgba(255,255,255,0.08);box-shadow:none;`}
        }
        .game-card:hover .game-image {
            filter: brightness(1.1);
        }
        .game-card:hover .game-name {
            color: ${themedHover ? color : "white"};
        }
        .search-input:focus {
            border-color: ${rgba(color, 0.40)};
            box-shadow: 0 0 15px ${rgba(color, 0.10)};
        }
    `;

    updateDotStyle(color);
}

/* Dot Cursor Logic */
const dot = document.getElementById('phantom-dot');
let dotActive = false;

function updateDotStyle(color) {
    if (!color) color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    dot.style.background = color;
    dot.style.boxShadow = `0 0 6px 2px ${color}, 0 0 14px 4px ${rgba(color,0.50)}, 0 0 28px 8px ${rgba(color,0.25)}`;
}

document.addEventListener('mousemove', e => {
    if (!dotActive) return;
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
});

function enableDotCursor() {
    dotActive = true; dot.style.display = 'block'; updateDotStyle();
    document.documentElement.style.cursor = 'none';
    let s = document.getElementById('dot-cursor-style');
    if (!s) { s = document.createElement('style'); s.id = 'dot-cursor-style'; s.textContent = '*{cursor:none!important;}'; document.head.appendChild(s); }
}

function disableDotCursor() {
    dotActive = false; dot.style.display = 'none';
    document.documentElement.style.cursor = '';
    const s = document.getElementById('dot-cursor-style'); if (s) s.remove();
}

/* Panic Key */
let panicEnabled = false;
document.addEventListener('keydown', e => {
    if (!panicEnabled) return;
    const pk = localStorage.getItem('phantom_panickey');
    const url = localStorage.getItem('phantom_panicurl') || 'https://google.com';
    if (pk && e.key.toLowerCase() === pk.toLowerCase()) window.location.href = url;
});

/* Render Games */
function renderGames(games) {
    const grid = document.getElementById('gamesGrid');

    const filteredGames = games.filter(game =>
        !game.name.toLowerCase().includes('game')
    );

    if (filteredGames.length === 0) {
        grid.innerHTML = '<div class="no-results">NO GAMES FOUND</div>';
        return;
    }

    grid.innerHTML = filteredGames.map(game => `
        <a href="javascript:void(0)" class="game-card" onclick="openGame('${game.url}')">
            <img src="${game.image}" alt="${game.name}" class="game-image"
                 onerror="this.src='https://via.placeholder.com/200x200/1a1a1a/ffffff?text=${encodeURIComponent(game.name.charAt(0))}'">

            <div class="game-overlay">
                <div class="game-name">${game.name}</div>
                <div class="game-category">${game.category}</div>
            </div>
        </a>
    `).join('');
}

/* Filter Games */
function filterGames() {
    const query = document.getElementById('gameSearch').value.toLowerCase();
    const filtered = gamesData.filter(game =>
        !game.name.toLowerCase().includes('game') &&
        (game.name.toLowerCase().includes(query) || game.category.toLowerCase().includes(query))
    );
    renderGames(filtered);
}


/* Load Games*/
const COVER_URL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const HTML_URL  = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";

async function loadGames() {
    try {
        const res = await fetch("https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json");
        const data = await res.json();

        const games = data
  .filter(g => g.id >= 0)
  .map(g => ({
    id: g.id,
    name: g.name,
    category: g.category || "Game",
    image: (g.cover || "").replace("{COVER_URL}", COVER_URL),
    url: (g.url || "").replace("{HTML_URL}", HTML_URL)
}));

        gamesData = games;
        renderGames(gamesData);

    } catch (err) {
        document.getElementById('gamesGrid').innerHTML =
            '<div class="no-results">FAILED TO LOAD GAMES</div>';
    }
}


/* Initialization */
(function init() {
    const accent = localStorage.getItem('phantom_accent') || '#ff8c00';
    const cursor = localStorage.getItem('phantom_cursor') || 'default';
    const wallpaper = localStorage.getItem('phantom_wallpaper') || '';
    const cloakOn = localStorage.getItem('phantom_cloak_on') === 'true';
    const cloakName = localStorage.getItem('phantom_cloak_name') || '';
    const cloakIcon = localStorage.getItem('phantom_cloak_icon') || '';
    const panicOn = localStorage.getItem('phantom_panic_on') === 'true';

    applyAccent(accent);

    if (cursor === 'dot') enableDotCursor();
    else { disableDotCursor(); document.documentElement.style.cursor = (cursor === 'default' ? '' : cursor); }

    if (wallpaper) {
        document.body.style.backgroundImage = `url('${wallpaper}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
    }

    if (cloakOn && cloakName) {
        document.title = cloakName;
        let link = document.querySelector("link[rel='icon']");
        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
        link.href = cloakIcon;
    }

    panicEnabled = panicOn;

    loadGames();
})();

/* Version Loader */
fetch("version.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("version").textContent = `PHANTOM ${data.version}`;
    })
    .catch(() => {
        document.getElementById("version").textContent = "PHANTOM";
    });

/* Updated Game Launch Logic */
async function openGame(url) {
    const viewer = document.getElementById('game-viewer');
    const frame = document.getElementById('game-frame');
    
    // Display the viewer immediately
    viewer.style.display = 'block';
    document.body.style.overflow = 'hidden'; // Prevent scrolling background
    
    try {
        const response = await fetch(url);
        const html = await response.text();
        
        // Use srcdoc to force the browser to render the plain text as HTML
        frame.srcdoc = html;
        
        // Push state so back button works for the user
        history.pushState({ viewingGame: true }, "");
    } catch (err) {
        console.error("Failed to fetch game code:", err);
        // Fallback to direct navigation if fetch is blocked
        window.location.href = url;
    }
}

function closeGame() {
    const viewer = document.getElementById('game-viewer');
    const frame = document.getElementById('game-frame');
    
    viewer.style.display = 'none';
    frame.srcdoc = ""; // Clear content
    document.body.style.overflow = '';
}

// Handle Browser Back Button to close the game viewer
window.onpopstate = function(event) {
    if (document.getElementById('game-viewer').style.display === 'block') {
        closeGame();
    }
};
    
</script>
</body>
</html>
